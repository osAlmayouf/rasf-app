<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <script>
    var l = window.location;
    l.replace(l.protocol + '//' + l.host + l.pathname.split('/').slice(0, 1).join('/') +
      '/?/' + l.pathname.slice(1) + l.search + l.hash
    );
  </script>
</head>
<body></body>
</html>
